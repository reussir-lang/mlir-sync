name: MLIR CI (macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore file timestamps
        uses: chetan/git-restore-mtime-action@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Homebrew dependencies
        run: |
          brew update
          brew install cmake libomp llvm ninja python@3
          python3 -m pip install --user lit

      - name: Configure environment
        run: |
          LLVM_PREFIX="$(brew --prefix llvm)"
          LIBOMP_PREFIX="$(brew --prefix libomp)"
          LLVM_VERSION="$("${LLVM_PREFIX}/bin/llvm-config" --version)"
          case "${LLVM_VERSION}" in
            22.*) ;;
            *)
              echo "Expected LLVM 22.x, found ${LLVM_VERSION}" >&2
              exit 1
              ;;
          esac
          echo "${LLVM_PREFIX}/bin" >> "${GITHUB_PATH}"
          echo "LLVM_PREFIX=${LLVM_PREFIX}" >> "${GITHUB_ENV}"
          echo "LIBOMP_PREFIX=${LIBOMP_PREFIX}" >> "${GITHUB_ENV}"
          echo "LLVM_DIR=${LLVM_PREFIX}/lib/cmake/llvm" >> "${GITHUB_ENV}"
          echo "MLIR_DIR=${LLVM_PREFIX}/lib/cmake/mlir" >> "${GITHUB_ENV}"
          echo "CPATH=${LIBOMP_PREFIX}/include:${CPATH}" >> "${GITHUB_ENV}"
          echo "LIBRARY_PATH=${LIBOMP_PREFIX}/lib:${LIBRARY_PATH}" >> "${GITHUB_ENV}"
          echo "DYLD_LIBRARY_PATH=${LLVM_PREFIX}/lib:${LIBOMP_PREFIX}/lib:${DYLD_LIBRARY_PATH}" >> "${GITHUB_ENV}"
          echo "LLVM_SYMBOLIZER_PATH=${LLVM_PREFIX}/bin/llvm-symbolizer" >> "${GITHUB_ENV}"

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER="${LLVM_PREFIX}/bin/clang" \
            -DCMAKE_CXX_COMPILER="${LLVM_PREFIX}/bin/clang++" \
            -DSYNC_ENABLE_TESTS=ON \
            -DLLVM_DIR="${LLVM_DIR}" \
            -DMLIR_DIR="${MLIR_DIR}"

      - name: Build
        run: cmake --build build --parallel

      - name: Run MLIR integration tests
        run: cmake --build build --target check-sync --parallel
