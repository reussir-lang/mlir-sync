name: Wasm CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  wasm-test:
    name: wasm / ${{ matrix.toolchain }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - toolchain: stable
            command: cargo test --workspace --lib --target wasm32-wasip1-threads
          - toolchain: nightly
            command: cargo test --workspace --lib --target wasm32-wasip1-threads --features nightly

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: wasm32-wasip1-threads

      - name: Install Wasmer
        run: curl https://get.wasmer.io -sSfL | sh

      - name: Add Wasmer to PATH
        run: echo "$HOME/.wasmer/bin" >> "$GITHUB_PATH"

      - name: Register Wasmer binfmt
        run: sudo "$HOME/.wasmer/bin/wasmer" binfmt register

      - name: Run wasm tests
        run: ${{ matrix.command }}
